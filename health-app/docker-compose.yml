services:
  backend:
    build:
      context: ./backend
    container_name: health-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      - BACKEND_PORT=8080
      - AI_SERVICE_BASE_URL=http://ai-service:5000
    depends_on:
      - ai-service

  ai-service:
    build:
      context: ./ai-service
    container_name: health-ai-service
    ports:
      - "${AI_SERVICE_PORT:-5000}:5000"
    environment:
      - AI_SERVICE_PORT=5000
